[Application Options]
noseedbackup=1
debuglevel=info
maxpendingchannels=10

# Tor-only — required for Thunder Node / AnonTransport
nolisten=true
# externalip=<your-onion-address>.onion  ← uncomment after Tor setup

[Bitcoin]
bitcoin.active=1
bitcoin.signet=1
bitcoin.node=bitcoind

[Bitcoind]
# Fill in after starting bitcoind
# bitcoind.rpchost=127.0.0.1
# bitcoind.rpcuser=vusd
# bitcoind.rpcpass=vusd_rpc_password
# bitcoind.zmqpubrawblock=tcp://127.0.0.1:28332
# bitcoind.zmqpubrawtx=tcp://127.0.0.1:28333

[tor]
tor.active=1
tor.v3=1
tor.socks=127.0.0.1:9050
tor.dns=1
