# VUSD Protocol — Docker Compose override for production secret management
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up
#
# This overlay replaces environment variable secrets with Docker secrets.
# Docker secrets are mounted as files at /run/secrets/<name> inside containers.
# They are never exposed in `docker inspect`, process environments, or logs.
#
# Setup:
#   echo "your_seed_hex" | docker secret create oracle_1_privkey_seed -
#   echo "your_seed_hex" | docker secret create oracle_2_privkey_seed -
#   ... (repeat for oracles 3–7 and keeper pubkeys)

version: "3.9"

secrets:
  oracle_1_privkey_seed:
    external: true
  oracle_2_privkey_seed:
    external: true
  oracle_3_privkey_seed:
    external: true
  oracle_4_privkey_seed:
    external: true
  oracle_5_privkey_seed:
    external: true
  oracle_6_privkey_seed:
    external: true
  oracle_7_privkey_seed:
    external: true
  bitcoin_rpc_pass:
    external: true

services:
  bitcoind:
    environment:
      BITCOIN_RPC_PASS_FILE: /run/secrets/bitcoin_rpc_pass
    secrets:
      - bitcoin_rpc_pass

  oracle-1:
    environment:
      VUSD_PRIVKEY_SEED:      ""            # clear the env var
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_1_privkey_seed
    secrets:
      - oracle_1_privkey_seed

  oracle-2:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_2_privkey_seed
    secrets:
      - oracle_2_privkey_seed

  oracle-3:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_3_privkey_seed
    secrets:
      - oracle_3_privkey_seed

  oracle-4:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_4_privkey_seed
    secrets:
      - oracle_4_privkey_seed

  oracle-5:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_5_privkey_seed
    secrets:
      - oracle_5_privkey_seed

  oracle-6:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_6_privkey_seed
    secrets:
      - oracle_6_privkey_seed

  oracle-7:
    environment:
      VUSD_PRIVKEY_SEED:      ""
      VUSD_PRIVKEY_SEED_FILE: /run/secrets/oracle_7_privkey_seed
    secrets:
      - oracle_7_privkey_seed
