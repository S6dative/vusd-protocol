# Bitcoin Core signet configuration for VUSD testnet
signet=1
server=1
txindex=1
daemon=1

# RPC credentials — change password before production use
rpcuser=vusd
rpcpassword=vusd_rpc_password
rpcport=38332
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# ZMQ for LND
zmqpubrawblock=tcp://127.0.0.1:28332
zmqpubrawtx=tcp://127.0.0.1:28333

# No pruning — needed for txindex
prune=0

# Memory
maxmempool=300
