[licenses]
# Allow common permissive and copyleft-compatible licenses used in the Rust ecosystem.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[advisories]
# Deny all known security vulnerabilities with no exceptions.
vulnerability = "deny"
unmaintained   = "warn"
yanked         = "deny"
notice         = "warn"

[bans]
# Deny multiple versions of the same crate — forces dependency resolution discipline.
multiple-versions = "warn"
wildcards         = "deny"   # no wildcard version specs in Cargo.toml

[sources]
# Only allow crates from crates.io — no git dependencies in production.
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
